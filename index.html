<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Lodi Muslim Masjid</title>

<style>

body {
    margin: 0;
    background: radial-gradient(circle at top, #061a33, #000);
    font-family: Arial;
    color: white;
}

#barx {
    text-align: center;
    font-size: clamp(30px, 6vw, 60px);
    font-weight: 900;
    background: black;
    padding: 15px;
    text-shadow: 3px 3px 0 #000;
}

#address {
    text-align: center;
    font-size: clamp(18px, 3vw, 28px);
}

#clock {
    text-align: center;
    font-size: clamp(40px, 8vw, 70px);
    font-weight: 900;
    background: black;
    border: 5px solid red;
    padding: 15px;
    margin: 15px;
    border-radius: 12px;
    text-shadow: 3px 3px 0 #000;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    background: black;
}

td, th {
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px;
    text-align: center;
    font-size: clamp(18px, 4vw, 48px);
    font-weight: 900;
    color: white;
    text-shadow: 2px 2px 0 #000;
}

.next { background: linear-gradient(135deg, #1e5eff, #0033ff) !important; }
.active { background: green !important; }

#countdown {
    margin-top: 15px;
    padding: 20px;
    text-align: center;
    font-size: clamp(20px, 5vw, 50px);
    font-weight: 900;
    background: green;
    color: white;
    display: none;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 20px;
    background: black;
    border: 2px solid red;
    color: white;
}

* { box-sizing: border-box; }

/* ⭐ UPDATED DONATION SECTION */
#donate {
    margin-top: 35px;
    background: black;
    padding: 25px;
    text-align: center;
    color: yellow;
    font-size: clamp(18px, 3vw, 34px);
    font-weight: 900;
    line-height: 1.6;
    border-top: 3px solid yellow;
}

</style>
</head>

<body>

<div id="barx">LODI MUSLIM MASJID</div>
<div id="address">701 S Hutchins St, Lodi, CA 95240</div>

<div id="clock"></div>

<table>
<thead>
<tr>
<th>Salah</th>
<th>Azaan</th>
<th>Iqamah</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="countdown"></div>

<button id="magBtn">Maghrib Offset (minutes)</button>

<!-- ⭐ UPDATED DONATION SECTION -->
<div id="donate">
Donate to Masjid (Zelle): 209-327-7472<br><br>
Pay Maktab Fee: alaqsacenter210@gmail.com
</div>

<script>

const PASSWORD = "Pakistan2026$";
const DEFAULT_MAGHRIB = 3;

let stored = JSON.parse(localStorage.getItem("masjid_final")) || {
    maghribOffset: 0,
    iqamah: {
        Fajr: "05:45 AM",
        Dhuhr: "01:45 PM",
        Asr: "06:15 PM",
        Maghrib: "07:50 PM",
        Isha: "09:15 PM",
        Jummah: "01:45 PM"
    }
};

let iqamah = stored.iqamah;

const baseAzan = {
    Fajr: "05:02 AM",
    Dhuhr: "01:04 PM",
    Asr: "05:50 PM",
    Maghrib: "07:50 PM",
    Isha: "09:06 PM"
};

function save(){
    localStorage.setItem("masjid_final", JSON.stringify(stored));
}

function checkPass(){
    return prompt("Enter Password:") === PASSWORD;
}

/* TIME HELPERS */
function toMin(t){
    let [time,ampm]=t.split(" ");
    let [h,m]=time.split(":").map(Number);
    if(ampm==="PM"&&h!==12)h+=12;
    if(ampm==="AM"&&h===12)h=0;
    return h*60+m;
}

function fromMin(min){
    let h=Math.floor(min/60)%24;
    let m=min%60;
    let ap=h>=12?"PM":"AM";
    h=h%12||12;
    return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

/* MAGHRIB +3 DEFAULT */
function maghribOffset(){
    return (stored.maghribOffset||0) + DEFAULT_MAGHRIB;
}

function shift(t, mins){
    return fromMin(toMin(t)+mins);
}

/* AZAAN */
function getAzan(n){
    if(n==="Jummah") return baseAzan.Dhuhr;
    if(n==="Maghrib") return shift(baseAzan.Maghrib, maghribOffset());
    return baseAzan[n];
}

/* IQAMAH */
function getIqamah(n){
    if(n==="Maghrib") return shift(iqamah.Maghrib, maghribOffset());
    return iqamah[n];
}

/* CLOCK */
setInterval(()=>{
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
    updateCountdown();
},1000);

/* EDIT */
function editIq(n){
    if(!checkPass()) return;
    let v=prompt("Update Iqamah", iqamah[n]);
    if(v){
        iqamah[n]=v;
        save();
        render();
    }
}

/* OFFSET */
document.getElementById("magBtn").onclick=()=>{
    if(!checkPass()) return;
    let v=prompt("Offset minutes", stored.maghribOffset);
    if(v!==null){
        stored.maghribOffset=parseInt(v)||0;
        save();
        render();
    }
};

/* NEXT */
function nextIndex(order){
    let now=new Date().getHours()*60 + new Date().getMinutes();
    for(let i=0;i<order.length;i++){
        let iq=toMin(getIqamah(order[i]));
        if(now<=iq+10) return i;
    }
    return 0;
}

/* COUNTDOWN */
function updateCountdown(){
    let order=["Fajr","Dhuhr","Asr","Maghrib","Isha","Jummah"];
    let now=new Date().getHours()*60 + new Date().getMinutes();

    for(let i=0;i<order.length;i++){
        let iq=toMin(getIqamah(order[i]));
        let diff=iq-now;

        if(diff<=10 && diff>0){
            let min=Math.floor(diff);
            let sec=60-new Date().getSeconds();

            document.getElementById("countdown").style.display="block";
            document.getElementById("countdown").innerText=
                `${min}:${String(sec).padStart(2,'0')} MIN LEFT`;
            return;
        }
    }

    document.getElementById("countdown").style.display="none";
}

/* RENDER */
function render(){

    let order=["Fajr","Dhuhr","Asr","Maghrib","Isha","Jummah"];
    let next=nextIndex(order);
    let now=new Date().getHours()*60 + new Date().getMinutes();

    let table=document.getElementById("table");
    table.innerHTML="";

    for(let i=0;i<order.length;i++){

        let n=order[i];
        let iq=toMin(getIqamah(n));

        let row=document.createElement("tr");

        if(now>=iq && now<=iq+2) row.className="active";
        else if(i===next) row.className="next";

        row.innerHTML=`
            <td>${n}</td>
            <td>${getAzan(n)}</td>
            <td onclick="editIq('${n}')">${getIqamah(n)}</td>
        `;

        table.appendChild(row);
    }
}

render();

</script>

</body>
</html>
