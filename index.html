<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Lodi Muslim Masjid</title>

<style>

body {
    margin: 0;
    background: radial-gradient(circle at top, #061a33, #000);
    font-family: Arial;
    color: white;
}

/* 🔴 UPDATED TITLE */
#barx {
    text-align: center;
    font-size: clamp(30px, 6vw, 60px);
    font-weight: 900;
    color: white;
    background: black;
    padding: 15px;

    text-shadow:
        3px 3px 0 #000,
        6px 6px 12px rgba(255,255,255,0.4),
        0 0 15px rgba(255,255,255,0.6);
}

/* 🔴 UPDATED ADDRESS */
#address {
    text-align: center;
    font-size: clamp(18px, 3vw, 28px);
    margin-top: 5px;
    opacity: 0.95;
}

/* CLOCK */
#clock {
    text-align: center;
    font-size: clamp(40px, 8vw, 70px);
    font-weight: 900;
    color: white;
    background: black;
    border: 5px solid red;
    padding: 15px;
    margin: 15px;
    border-radius: 12px;
    white-space: nowrap;
    text-shadow: 3px 3px 0 #000, 6px 6px 10px rgba(255,255,255,0.3), 0 0 15px rgba(255,255,255,0.6);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    table-layout: fixed;
}

td, th {
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px;
    text-align: center;
    font-size: clamp(18px, 4vw, 48px);
    font-weight: 900;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 2px 2px 6px black;
}

.next {
    background: linear-gradient(135deg, #1e5eff, #0033ff) !important;
}

.active {
    background: green !important;
}

#countdown {
    margin-top: 15px;
    padding: 20px;
    text-align: center;
    font-size: clamp(20px, 5vw, 50px);
    font-weight: 900;
    background: green;
    color: white;
    display: none;
    white-space: nowrap;
    text-shadow: 3px 3px 0 black, 0 0 15px #00ff00;
}

.iq {
    cursor: pointer;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 18px;
    font-size: 20px;
    background: black;
    border: 2px solid red;
    color: white;
}

#zelle {
    margin-top: 30px;
    padding: 25px;
    text-align: center;
    font-size: clamp(18px, 3vw, 34px);
    font-weight: 900;
    color: #00ffcc;
}

#zelle a {
    color: yellow;
    display: block;
    margin-top: 10px;
}

* {
    box-sizing: border-box;
}

</style>
</head>

<body>

<div id="barx">LODI MUSLIM MASJID</div>
<div id="address">701 S Hutchins St, Lodi, CA 95240</div>

<div id="clock"></div>

<table>
<thead>
<tr>
<th>Salah</th>
<th>Azaan</th>
<th>Iqamah</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="countdown"></div>

<button id="magBtn">Maghrib Offset (minutes)</button>

<div id="zelle">
Zelle Donation: 209-327-7472
<br>
<a href="mailto:alaqsacenter210@gmail.com">
Maktab Fee: alaqsacenter210@gmail.com
</a>
</div>

<script>

const ADMIN_PASSWORD = "Pakistan2026$";
let isAdmin = false;

let stored = JSON.parse(localStorage.getItem("masjid_final")) || {
    maghribOffset: 0,
    iqamah: {
        Fajr: "05:45 AM",
        Dhuhr: "01:45 PM",
        Asr: "06:15 PM",
        Maghrib: "07:50 PM",
        Isha: "09:15 PM",
        Jummah: "01:45 PM"
    }
};

let iqamah = stored.iqamah;

const baseAzan = {
    Fajr: "05:02 AM",
    Dhuhr: "01:04 PM",
    Asr: "05:50 PM",
    Maghrib: "07:50 PM",
    Isha: "09:06 PM"
};

function save(){
    localStorage.setItem("masjid_final", JSON.stringify(stored));
}

function toMin(t){
    let [time,ampm]=t.split(" ");
    let [h,m]=time.split(":").map(Number);
    if(ampm==="PM"&&h!==12)h+=12;
    if(ampm==="AM"&&h===12)h=0;
    return h*60+m;
}

function getAzan(name){
    if(name==="Jummah") return baseAzan.Dhuhr;

    if(name==="Maghrib"){
        let [t]=baseAzan.Maghrib.split(" ");
        let [h,m]=t.split(":").map(Number);
        let d=new Date();
        d.setHours(h);
        d.setMinutes(m + stored.maghribOffset);

        let hh=d.getHours();
        let mm=d.getMinutes();
        let ap=hh>=12?"PM":"AM";
        hh=hh%12||12;

        return `${hh}:${String(mm).padStart(2,'0')} ${ap}`;
    }

    return baseAzan[name];
}

setInterval(()=>{
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
    updateCountdown();
},1000);

function editIq(n){
    if(n==="Maghrib"){
        alert("Maghrib Iqamah = Azaan automatically");
        return;
    }
    let v = prompt("Edit Iqamah", iqamah[n]);
    if(v){
        iqamah[n]=v;
        save();
        render();
    }
}

document.getElementById("magBtn").onclick=()=>{
    let v=prompt("Offset minutes", stored.maghribOffset);
    if(v!==null){
        stored.maghribOffset=parseInt(v)||0;
        save();
        render();
    }
};

function nextIndex(order){
    let now=new Date().getHours()*60 + new Date().getMinutes();
    for(let i=0;i<order.length;i++){
        let iq = (order[i]==="Maghrib")
            ? toMin(getAzan("Maghrib"))
            : toMin(iqamah[order[i]]);
        if(now <= iq + 10) return i;
    }
    return 0;
}

function updateCountdown(){
    let order=["Fajr","Dhuhr","Asr","Maghrib","Isha","Jummah"];
    let now=new Date().getHours()*60 + new Date().getMinutes();

    for(let i=0;i<order.length;i++){
        let iq = (order[i]==="Maghrib")
            ? toMin(getAzan("Maghrib"))
            : toMin(iqamah[order[i]]);

        let diff = iq - now;

        if(diff <= 10 && diff > 0){
            let min = Math.floor(diff);
            let sec = 60 - new Date().getSeconds();

            document.getElementById("countdown").style.display="block";
            document.getElementById("countdown").innerText =
                `${min}:${String(sec).padStart(2,'0')} MINUTES LEFT`;
            return;
        }
    }

    document.getElementById("countdown").style.display="none";
}

function render(){

    let order=["Fajr","Dhuhr","Asr","Maghrib","Isha","Jummah"];
    let next = nextIndex(order);
    let now=new Date().getHours()*60 + new Date().getMinutes();

    let table=document.getElementById("table");
    table.innerHTML="";

    for(let i=0;i<order.length;i++){

        let n=order[i];

        let iqDisplay = (n==="Maghrib")
            ? getAzan("Maghrib")
            : iqamah[n];

        let iq = (n==="Maghrib")
            ? toMin(getAzan("Maghrib"))
            : toMin(iqamah[n]);

        let row=document.createElement("tr");

        if(now >= iq && now <= iq+2){
            row.className="active";
        } else if(i===next){
            row.className="next";
        }

        row.innerHTML=`
            <td>${n}</td>
            <td>${getAzan(n)}</td>
            <td class="iq" onclick="editIq('${n}')">${iqDisplay}</td>
        `;

        table.appendChild(row);
    }
}

render();

</script>

</body>
</html>
